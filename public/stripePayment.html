<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Processing Payment...</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        width: min(92vw, 560px);
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 20px 48px -34px rgba(15, 23, 42, 0.55);
        padding: 24px;
        text-align: center;
      }
      .hint {
        font-size: 14px;
        color: #475569;
      }
      a {
        color: #4f46e5;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Finalizing your payment...</h1>
      <p class="hint">Please wait while we verify your order and sync credits.</p>
      <p class="hint" id="fallback" style="display: none">
        Continue manually:
        <a id="fallbackLink" href="/payment/success?channel=stripe">Open payment status</a>
      </p>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var sessionId = params.get("session_id");
        var target = "/payment/success?channel=stripe";
        if (sessionId) {
          target += "&session_id=" + encodeURIComponent(sessionId);
        }
        try {
          window.location.replace(target);
        } catch (e) {
          var fallback = document.getElementById("fallback");
          var fallbackLink = document.getElementById("fallbackLink");
          if (fallback && fallbackLink) {
            fallback.style.display = "block";
            fallbackLink.href = target;
          }
        }
      })();
    </script>
  </body>
</html>
